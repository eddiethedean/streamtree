# Static doc site (MkDocs). Run: uv run python -m mkdocs build --strict
site_name: StreamTree
site_description: Declarative, typed composition for Streamlit.
repo_url: https://github.com/streamtree-dev/streamtree

docs_dir: docs
site_dir: site

strict: true

theme:
  name: readthedocs

nav:
  - Home: index.md
  - Changelog: CHANGELOG.md
  - Guides:
      - Plan: PLAN.md
      - Roadmap: ROADMAP.md
      - Dependency strategy: DEPENDENCY_STRATEGY.md
      - Performance: PERFORMANCE.md
      - Phase 3 CRUD patterns: PHASE3_CRUD.md
      - Phase 2 tail: PHASE2_TAIL.md
      - Phase 2 portals & prefetch: PHASE2_PORTALS_AND_PREFETCH.md
      - Phase 2 form layout: PHASE2_FORMS.md
