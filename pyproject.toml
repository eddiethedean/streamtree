[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "streamtree"
version = "0.1.0"
description = "Composable, typed Streamlit applications with a declarative component model."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Streamtree contributors" }]
keywords = ["streamlit", "ui", "components", "declarative"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: Streamlit",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = [
  "streamlit>=1.28.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4.0",
  "mypy>=1.8.0",
  "ruff>=0.2.0",
]

[project.urls]
Homepage = "https://github.com/streamtree-dev/streamtree"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.10"
strict = true
packages = ["streamtree"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
  "ignore:.*async fixture 'ensure_greenlet_context'.*:pytest.PytestRemovedIn9Warning",
]
