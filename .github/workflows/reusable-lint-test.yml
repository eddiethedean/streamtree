# Called from CI and Release matrix jobs (one OS + Python version per invocation).
name: Reusable lint and test

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      python-version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  quality:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 20
    env:
      UV_PYTHON: ${{ inputs.python-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Python ${{ inputs.python-version }} (${{ inputs.os }})
        run: uv python install ${{ inputs.python-version }}

      - name: Sync dev environment
        run: uv sync --frozen --python ${{ inputs.python-version }} --extra dev

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff
        run: uv run ruff check src tests

      - name: ty
        run: uv run ty check src

      - name: Pytest with coverage
        run: uv run pytest tests/ -q
