name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: lint-test (${{ matrix.os }}, ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        # Pin VS2026 image; windows-latest was emitting redirect notices from windows-2025.
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    uses: ./.github/workflows/reusable-lint-test.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}

  cli-smoke:
    name: cli-smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]
    uses: ./.github/workflows/reusable-cli-smoke.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}

  docs-and-dist:
    name: MkDocs and package build
    uses: ./.github/workflows/reusable-docs-and-dist.yml
    secrets: inherit
