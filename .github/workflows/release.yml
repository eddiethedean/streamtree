name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-test:
    name: lint-test (${{ matrix.os }}, ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    uses: ./.github/workflows/reusable-lint-test.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}

  cli-smoke:
    name: cli-smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]
    uses: ./.github/workflows/reusable-cli-smoke.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}

  docs-and-dist:
    name: MkDocs and distributions
    needs: [lint-test, cli-smoke]
    uses: ./.github/workflows/reusable-docs-and-dist.yml
    secrets: inherit
    with:
      upload-artifact: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [docs-and-dist]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [docs-and-dist]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      # GitHub Packages expects the repository owner as the username with ``GITHUB_TOKEN``;
      # ``__token__`` is only for PyPI-style API tokens (``pypi-...``).
      - name: Publish to GitHub Packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          repository-url: https://upload.pypi.pkg.github.com/${{ github.repository }}/
          attestations: "false"
