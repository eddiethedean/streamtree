# Strict MkDocs site + ``uv build`` on Ubuntu / Python 3.12. Optionally uploads ``dist/`` for release publish jobs.
name: Reusable docs and distributions

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: Upload ``dist/`` as ``python-package-distributions`` for PyPI / GitHub Packages jobs
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docs-and-dist:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Python 3.12
        run: uv python install 3.12

      - name: Sync dev (MkDocs)
        run: uv sync --frozen --python 3.12 --extra dev

      - name: MkDocs build (strict)
        run: uv run python -m mkdocs build --strict

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions
        if: ${{ inputs.upload-artifact == true }}
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
